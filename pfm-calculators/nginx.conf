server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 256;

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # /learn exact → the prerendered index (avoids colliding with the /learn/ dir)
    location = /learn {
        try_files /learn.html /index.html;
    }

    # Clean-URL routing: serve /sip-calculator from the prerendered
    # /sip-calculator.html (no trailing-slash redirect), else SPA fallback.
    # Also covers /learn/<guide> → /learn/<guide>.html.
    location / {
        try_files $uri $uri.html /index.html;
    }
}
